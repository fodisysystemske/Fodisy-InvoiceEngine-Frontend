<div class="clock-card" aria-label="Analog clock">
  <div class="clock-face" role="img" aria-label="Analog clock face">
    <svg class="clock-svg" viewBox="0 0 120 120" aria-hidden="true">
      <defs>
        <radialGradient id="dialGlow" cx="50%" cy="40%" r="70%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.18)" />
          <stop offset="70%" stop-color="rgba(255,255,255,0.06)" />
          <stop offset="100%" stop-color="rgba(0,0,0,0.08)" />
        </radialGradient>
      </defs>

      <circle cx="60" cy="60" r="56" fill="url(#dialGlow)" stroke="rgba(255,255,255,0.18)" stroke-width="1.2" />
      <circle cx="60" cy="60" r="2.2" fill="rgba(255,255,255,0.85)" />

      <!-- hour ticks -->
      <g stroke="rgba(255,255,255,0.55)" stroke-width="2" stroke-linecap="round">
        <line x1="60" y1="8" x2="60" y2="16" />
        <line x1="60" y1="104" x2="60" y2="112" />
        <line x1="8" y1="60" x2="16" y2="60" />
        <line x1="104" y1="60" x2="112" y2="60" />
      </g>

      <!-- minute ticks (subtle) -->
      <g stroke="rgba(255,255,255,0.18)" stroke-width="1" stroke-linecap="round" opacity="0.8">
        <line x1="60" y1="10.5" x2="60" y2="13.5" transform="rotate(30 60 60)" />
        <line x1="60" y1="10.5" x2="60" y2="13.5" transform="rotate(60 60 60)" />
        <line x1="60" y1="10.5" x2="60" y2="13.5" transform="rotate(120 60 60)" />
        <line x1="60" y1="10.5" x2="60" y2="13.5" transform="rotate(150 60 60)" />
        <line x1="60" y1="10.5" x2="60" y2="13.5" transform="rotate(210 60 60)" />
        <line x1="60" y1="10.5" x2="60" y2="13.5" transform="rotate(240 60 60)" />
        <line x1="60" y1="10.5" x2="60" y2="13.5" transform="rotate(300 60 60)" />
        <line x1="60" y1="10.5" x2="60" y2="13.5" transform="rotate(330 60 60)" />
      </g>
    </svg>

    <div class="hand hour" [style.transform]="'rotate(' + hourAngle() + 'deg)'" aria-hidden="true"></div>
    <div class="hand minute" [style.transform]="'rotate(' + minuteAngle() + 'deg)'" aria-hidden="true"></div>
    <div class="hand second" [style.transform]="'rotate(' + secondAngle() + 'deg)'" aria-hidden="true"></div>
    <div class="pin" aria-hidden="true"></div>
  </div>

  <div class="clock-meta" aria-label="Digital time">
    <span class="time">
      {{ (hours() < 10 ? '0' + hours() : hours()) }}:{{ (minutes() < 10 ? '0' + minutes() : minutes()) }}
    </span>
    <span class="sec">{{ (seconds() < 10 ? '0' + seconds() : seconds()) }}</span>
  </div>
</div>
